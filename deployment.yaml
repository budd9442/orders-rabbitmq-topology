apiVersion: apps/v1
kind: Deployment
metadata:
  name: orders-app
  namespace: orders-system
  annotations:
    secret.reloader.stakater.com/reload: "rabbitmq-client-cert"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: orders-app
  template:
    metadata:
      labels:
        app: orders-app
    spec:
      serviceAccountName: orders-app-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: app
        image: orders-app:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
        volumeMounts:
        - name: certs
          mountPath: /etc/rabbitmq-certs
          readOnly: true
      volumes:
      - name: certs
        secret:
          secretName: rabbitmq-client-cert
