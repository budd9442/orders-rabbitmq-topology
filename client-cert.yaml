apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: rabbitmq-client-cert
  namespace: orders-system
spec:
  secretName: rabbitmq-client-cert
  commonName: orders-svc-user.rabbitmq.svc.cluster.local
  usages:
    - client auth
  issuerRef:
    name: vault-issuer
    kind: Issuer
    group: cert-manager.io
